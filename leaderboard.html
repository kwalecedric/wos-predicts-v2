<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOS PREDICTS — Leaderboard</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/leaderboard.css">
</head>
<body>

  <!-- TOP BAR -->
  <header class="top-bar">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 2c1.47 0 2.86.4 4.06 1.09l-1.56 4.8-2.5-.82-2.5.82-1.56-4.8A7.96 7.96 0 0 1 12 4zm-6.6 3.37 1.65 5.08-2.3 3.17A8.02 8.02 0 0 1 4 12c0-1.74.56-3.35 1.4-4.63zm13.2 0A7.95 7.95 0 0 1 20 12c0 1.63-.49 3.15-1.34 4.41l-2.31-3.17 1.65-5.07zM9.19 11.19l2.31-.76v4.76l-3.77 2.74a8.01 8.01 0 0 1-2.5-4.11l2.71-3.73.75 1.1zm5.62 0 .75-1.1 2.71 3.73a8.01 8.01 0 0 1-2.5 4.11L12 15.19v-4.76l2.31.76zm-2.81 6v-2.57l2.39 1.73-2.39.84zm0 0-2.39-.84 2.39-1.73v2.57z"/>
        </svg>
      </div>
      <div class="logo-text">WOS <span>PREDICTS</span></div>
    </div>
    <div class="league-name-badge" id="league-name-badge">Loading...</div>
  </header>

  <!-- MAIN -->
  <main class="main">

    <!-- MY STATS CARD -->
    <section class="my-stats-card" id="my-stats-card">
      <div class="my-stats-left">
        <div class="my-rank" id="my-rank">#—</div>
        <div class="my-name" id="my-name">You</div>
      </div>
      <div class="my-stats-right">
        <div class="my-stat">
          <div class="my-stat-val green" id="my-points">0</div>
          <div class="my-stat-label">Points</div>
        </div>
        <div class="my-stat">
          <div class="my-stat-val amber" id="my-accuracy">0%</div>
          <div class="my-stat-label">Accuracy</div>
        </div>
        <div class="my-stat">
          <div class="my-stat-val purple" id="my-streak">0</div>
          <div class="my-stat-label">Streak</div>
        </div>
      </div>
    </section>

    <!-- PRIZE BANNER -->
    <div class="prize-banner" id="prize-banner" style="display:none;">
      <div class="prize-banner-title">🏆 Prize breakdown</div>
      <div class="prize-list" id="prize-list"></div>
    </div>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="filter-tab active" id="tab-alltime" onclick="setFilter('alltime')">All time</button>
      <button class="filter-tab" id="tab-week" onclick="setFilter('week')">This week</button>
      <button class="filter-tab" id="tab-today" onclick="setFilter('today')">Today</button>
    </div>

    <!-- LEADERBOARD LIST -->
    <div id="lb-list">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading leaderboard...</div>
      </div>
    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="window.location.href='dashboard.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='predict.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
      </svg>
      <span>Predict</span>
    </button>
    <button class="nav-btn active" onclick="window.location.href='leaderboard.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>
      </svg>
      <span>Board</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='chat.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Chat</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='profile.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profile</span>
    </button>
  </nav>

  <!-- PLAYER HISTORY MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closePlayerModal()"></div>
  <div class="player-modal" id="player-modal">
    <div class="modal-handle"></div>
    <div class="player-modal-header" id="player-modal-header"></div>
    <div class="player-modal-stats" id="player-modal-stats"></div>
    <div class="modal-section-label">Prediction history</div>
    <div class="player-history-list" id="player-history-list">
      <div class="loading-state">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="js/leaderboard.js"></script>
</body>
</html>
