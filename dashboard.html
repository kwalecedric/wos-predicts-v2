<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WOS PREDICTS — Dashboard</title>
  <link rel="stylesheet" href="css/global.css">
</head>
<body style="color:white;text-align:center;padding-top:100px;">
  <h1>✅ Dashboard — Auth working!</h1>
  <p>You are logged in as Super Admin</p>
  <p id="uid"></p>
  <script type="module">
    import { getAuth } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    const auth = getAuth();
    auth.onAuthStateChanged(user => {
      document.getElementById('uid').textContent = 'UID: ' + (user?.uid || 'not logged in');
    });
  </script>
</body>
</html>
